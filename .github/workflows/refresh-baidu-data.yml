name: Refresh Baidu data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 0-14 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Refresh live-data.json
        env:
          BAIDU_LOGIN_NAME: ${{ secrets.BAIDU_LOGIN_NAME }}
          BAIDU_LOGIN_PASSWORD: ${{ secrets.BAIDU_LOGIN_PASSWORD }}
        run: npm run refresh:cloud
      - name: Commit updated data
        run: |
          if git diff --quiet live-data.json; then
            echo "live-data.json unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live-data.json
          git commit -m "refresh baidu live data"
          git push
